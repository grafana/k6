name: Browser tests
on:
  push:
    branches:
      - master
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      go_current: ${{ steps.go_versions.outputs.current }}
      go_prev: ${{ steps.go_versions.outputs.prev }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Resolve Go versions
        id: go_versions
        uses: ./.github/actions/go-versions

  test-prev:
    needs: configure
    if: ${{ github.ref == 'refs/heads/master' }}
    strategy:
      fail-fast: false
      matrix:
        go-version: ["${{ needs.configure.outputs.go_prev }}"]
        platform:
          [ubuntu-24.04, ubuntu-arm64-large, github-hosted-windows-x64-large]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run common test steps
        uses: ./.github/actions/test-common
        with:
          go_version: ${{ matrix.go-version }}
          platform: ${{ matrix.platform }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Get the k6 version
        id: get_k6_version
        run: |
          echo "Running tests on '${GITHUB_REF}' with '$(git describe --tags --always --long --dirty)' checked out..."
      - name: Run tests
        uses: ./.github/actions/test-browser

  test-tip:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            gotip_platform: ubuntu-24.04
          - platform: ubuntu-arm64-large
            gotip_platform: ubuntu-24.04-arm
          - platform: github-hosted-windows-x64-large
            gotip_platform: windows-latest
    runs-on: ${{ matrix.platform }}
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Run common test steps
        uses: ./.github/actions/test-common
        with:
          go_version: "gotip"
          platform: ${{ matrix.gotip_platform }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        uses: ./.github/actions/test-browser
        with:
          use_gotip: "true"

  test-latest:
    needs: configure
    strategy:
      fail-fast: false
      matrix:
        go-version: ["${{ needs.configure.outputs.go_current }}"]
        platform:
          [ubuntu-24.04, ubuntu-arm64-large, github-hosted-windows-x64-large]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Run common test steps
        uses: ./.github/actions/test-common
        with:
          go_version: ${{ matrix.go-version }}
          platform: ${{ matrix.platform }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run tests
        uses: ./.github/actions/test-browser
