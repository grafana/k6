name: Publish TechDocs
on:
  push:
    branches:
      - master
    paths:
      - 'docs/docs/**'
      - 'docs/mkdocs.yml'
      - 'catalog-info.yaml'
      - '.github/workflows/publish-techdocs.yaml'
concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true
permissions: {}
jobs:
  publish-docs:
    uses: grafana/shared-workflows/.github/workflows/publish-techdocs.yaml@8a16b96ee18c77596b132a2b8fac70dc6e30fd6b # main
    permissions:
      contents: read
      id-token: write
    with:
      namespace: default
      kind: component
      name: k6
      default-working-directory: .
