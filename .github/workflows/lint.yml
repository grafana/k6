name: Lint
on:
  # Enable manually triggering this workflow via the API or web UI
  workflow_dispatch:
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  generate-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x
          check-latest: true
      - name: Check code generation
        run: |
          make generate
          if [ -n "$(git status --porcelain)" ]; then
            echo "make generate produced changes:"
            git status --porcelain
            git --no-pager diff
            exit 1
          fi

  k6-ci:
    uses: grafana/k6-ci/.github/workflows/all.yml@143ec80c1678ae96a54b82389ea862d4748c27e1 # v0.3.0
    with:
      k6-ci-ref: 143ec80c1678ae96a54b82389ea862d4748c27e1 # v0.3.0
      skip-tests: true
      skip-extension-testing: true
