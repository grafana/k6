name: Lint
on:
  # Enable manually triggering this workflow via the API or web UI
  workflow_dispatch:
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  deps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: 1.26.x
          check-latest: true
      - name: Check dependencies
        run: |
            go version
            test -z "$(go mod tidy && go mod vendor && git status --porcelain)"
            go mod verify
      - name: Check code generation
        run: |
          make generate
          test -z "$(git status --porcelain | tee >(cat 1>&2))"

  lint:
    # Delegate to grafana/k6-ci's reusable workflow. We pin both the workflow
    # ref (in `uses:`) and `k6-ci-ref` to the same SHA so the lint config
    # comes from the exact same commit as the workflow logic. Renovate keeps
    # both lines in sync.
    uses: grafana/k6-ci/.github/workflows/all.yml@2e841ed1f99228ce33269efa60e300721ba5d683 # lint-action branch — bump once grafana/k6-ci#33 merges
    with:
      k6-ci-ref: 2e841ed1f99228ce33269efa60e300721ba5d683
      skip-tests: true
      skip-extension-testing: true
