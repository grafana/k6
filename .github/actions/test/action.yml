name: "Test"
description: "Run all tests except ones in browser/tests package"

inputs:
  platform:
    description: "matrix.platform value (used for windows/arm detection)."
    required: true
  use_gotip:
    description: "whether to set up gotip env variables or not"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Run tests
      shell: bash
      env:
        PLATFORM: ${{ inputs.platform }}
        USE_GOTIP: ${{ inputs.use_gotip }}
      run: |
        set -x

        if [[ ${USE_GOTIP} == 'true' ]]; then
          export GOROOT="$HOME/sdk/gotip"
          export GOPATH="$HOME/go"
          export PATH="$HOME/sdk/gotip/bin:$HOME/go/bin:$PATH" > /dev/null
        fi

        which go
        go version
        export GOMAXPROCS=2
        args=("-p" "2" "-race")
        # Run with less concurrency on Windows/ARM to minimize flakiness.
        if [[ "${PLATFORM}" == windows* || "${PLATFORM}" == *arm ]]; then
          args[1]="1"
          export GOMAXPROCS=1
          if [[ "${PLATFORM}" == windows* ]]; then
            unset args[2]
          fi
        fi
        if [[ ${USE_GOTIP} == 'true' ]]; then
          # Under Go 1.27+, golang.org/x/net/http2 switches to a "wrapping
          # implementation" that delegates to net/http. With it, ConfigureTransport
          # no longer forces HTTP/2 over custom dialers, and HTTP/2 errors surface as
          # unexported net/http/internal/http2 types that lib/netext/httpext can no
          # longer classify (only StreamError has an upstream errors.As bridge;
          # ConnectionError and GoAwayError do not). Force the legacy x/net
          # implementation until k6 adapts. See Dependencies.md / the http2 error
          # handling in lib/netext/httpext/error_codes.go.
          args+=("-tags" "http2legacy")
        fi
        go test "${args[@]}" -timeout 1600s `go list ./... | grep -v browser/tests`
